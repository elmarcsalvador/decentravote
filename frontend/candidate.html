<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #0f172a; --card-bg: #1e293b; --text-color: #f8fafc; --text-muted: #94a3b8; --primary: #3b82f6; --primary-hover: #2563eb; --success: #10b981; --error: #ef4444; --border: #334155; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;}
        header { width: 100%; padding: 20px 5%; background: var(--card-bg); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        header h1 { margin: 0; font-size: 1.5rem; }
        .card { background: var(--card-bg); padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; margin-top: 50px; border: 1px solid var(--border); box-sizing: border-box; text-align: center; }
        .card h3 { margin-top: 0; border-bottom: 1px solid var(--border); padding-bottom: 10px; text-align: left; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-color); color: var(--text-color); box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--primary); color: white; font-weight: 600; cursor: pointer; }
        button:hover { background: var(--primary-hover); }
        .alert { margin-top: 15px; padding: 12px; border-radius: 8px; font-size: 0.9rem; display: none; text-align: left;}
        .alert.success { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid var(--success); display: block; }
        .alert.error { background: rgba(239, 68, 68, 0.1); color: var(--error); border: 1px solid var(--error); display: block; }
        .nav-link { color: var(--text-muted); text-decoration: none; font-weight: 600; }
        .nav-link:hover { color: var(--text-color); }
        
        #dashboardPanel { display: none; }
        .score-circle { width: 150px; height: 150px; border-radius: 50%; background: rgba(59, 130, 246, 0.1); border: 4px solid var(--primary); display: flex; flex-direction: column; justify-content: center; align-items: center; margin: 30px auto; }
        .score-number { font-size: 3rem; font-weight: 800; color: var(--text-color); line-height: 1; }
        .score-label { font-size: 0.9rem; color: var(--text-muted); margin-top: 5px; text-transform: uppercase; font-weight: 600; }
    </style>
</head>
<body>

<header>
    <h1>👤 Candidate Portal</h1>
    <a href="index.html" class="nav-link">← Back to Voting</a>
</header>

<div class="card" id="loginPanel">
    <h3>Candidate Login</h3>
    <input type="text" id="candName" placeholder="Your Registered Name">
    <input type="password" id="candPass" placeholder="Password (cand123)">
    <button onclick="login()">View My Score</button>
    <div id="loginAlert" class="alert"></div>
</div>

<div class="card" id="dashboardPanel">
    <h3 id="welcomeMsg" style="text-align: center; border: none; margin-bottom: 0;">Welcome</h3>
    
    <div class="score-circle">
        <div class="score-number" id="myScore">0</div>
        <div class="score-label">Votes</div>
    </div>
    
    <button class="btn-outline" style="background: transparent; border: 1px solid var(--border); color: var(--text-color); margin-top: 20px;" onclick="refreshScore()">🔄 Refresh Score</button>
</div>

<script>
const API = "http://127.0.0.1:5000";
let currentCandidateName = "";
let currentCandidatePass = "";

function showAlert(element, message, type) {
    element.className = `alert ${type}`;
    element.innerText = message;
    setTimeout(() => { element.className = 'alert'; }, 4000);
}

async function login() {
    const name = document.getElementById("candName").value;
    const password = document.getElementById("candPass").value;

    if (!name || !password) return showAlert(document.getElementById("loginAlert"), "Please enter credentials", "error");

    try {
        const res = await fetch(API + "/candidate_login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({name, password})
        });
        const data = await res.json();

        if (data.success) {
            currentCandidateName = name;
            currentCandidatePass = password;
            document.getElementById("loginPanel").style.display = "none";
            document.getElementById("dashboardPanel").style.display = "block";
            
            document.getElementById("welcomeMsg").innerText = `Hello, ${data.name}`;
            document.getElementById("myScore").innerText = data.votes;
        } else {
            showAlert(document.getElementById("loginAlert"), data.message, "error");
        }
    } catch (e) {
        showAlert(document.getElementById("loginAlert"), "Server error", "error");
    }
}

// Function to refresh just the score using the stored credentials
async function refreshScore() {
    try {
        const res = await fetch(API + "/candidate_login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({name: currentCandidateName, password: currentCandidatePass})
        });
        const data = await res.json();
        if (data.success) {
            document.getElementById("myScore").innerText = data.votes;
        }
    } catch (e) { console.error("Could not refresh score"); }
}
</script>
</body>
</html>
